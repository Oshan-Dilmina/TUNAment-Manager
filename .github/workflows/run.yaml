name: Flask CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flask pytest 

      - name: Start Flask App in Background
        run: |
          # This runs app.py without blocking the next steps
          python app.py & 
          sleep 5

      - name: Run tests
        run: |
          # Ensure you have a 'tests' folder or change this to your test file
          pytest tests/
